name: Docs

# Builds the mdbook and deploys to Netlify on pushes to main.
# Requires the `NETLIFY_AUTH_TOKEN` and `NETLIFY_SITE_ID` secrets.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build & deploy the book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"
      - name: Build the book
        run: mdbook build
      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=book/book --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
